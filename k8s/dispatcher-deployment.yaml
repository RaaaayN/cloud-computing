apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher
  namespace: inference-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcher
  template:
    metadata:
      labels:
        app: dispatcher
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8002"
    spec:
      containers:
        - name: dispatcher
          image: dispatcher:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          env:
            # Short queue: bound the worst-case server-side wait
            # (wait <= queue/(replicas*serviceRate)) so p99 stays under the 0.5s
            # SLO, and shed the overflow as 503. A long queue (100) just lets the
            # backlog -- and p99 -- grow without bound under a burst.
            - name: DISPATCHER_QUEUE_MAX_SIZE
              value: "3"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dispatcher
  namespace: inference-system
spec:
  selector:
    app: dispatcher
  ports:
    - name: http
      port: 8002
      targetPort: 8002
  type: ClusterIP

