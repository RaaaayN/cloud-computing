apiVersion: v1
kind: ServiceAccount
metadata:
  name: autoscaler-sa
  namespace: inference-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autoscaler-role
  namespace: inference-system
rules:
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: autoscaler-rolebinding
  namespace: inference-system
subjects:
  - kind: ServiceAccount
    name: autoscaler-sa
    namespace: inference-system
roleRef:
  kind: Role
  name: autoscaler-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-autoscaler
  namespace: inference-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-autoscaler
  template:
    metadata:
      labels:
        app: custom-autoscaler
    spec:
      serviceAccountName: autoscaler-sa
      containers:
        - name: autoscaler
          image: autoscaler:latest
          imagePullPolicy: IfNotPresent
          # Real scaling is the default. To run the autoscaler in observe-only
          # mode (compute decisions without patching replicas), override with:
          #   args: ["--dry-run"]
          args: []
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus:9090
            - name: DEPLOYMENT_NAME
              value: inference
            - name: DEPLOYMENT_NAMESPACE
              value: inference-system
            - name: INTERVAL_SEC
              value: "15"
            - name: REPLICA_MIN
              value: "1"
            - name: REPLICA_MAX
              value: "5"             # cap low on purpose: running ~10 concurrent
                                     # ResNet18 inferences (each capped at 1 core)
                                     # causes memory/scheduler contention that makes
                                     # every inference slower -> higher p99 AND more
                                     # cores. Few replicas stay uncontended (fast),
                                     # use fewer cores, and the short dispatcher queue
                                     # sheds the overflow instead of inflating latency.
            - name: MAX_DELTA_PER_CYCLE
              value: "3"            # drain a burst faster (was 1 -> ~120s to reach 10 replicas)
            - name: S_WARN
              value: "0.40"         # react before the 0.5s SLO is breached (was 0.45)
            - name: SERVICE_TIME_SECONDS
              value: "0.2"

