apiVersion: v1
kind: ServiceAccount
metadata:
  name: autoscaler-sa
  namespace: inference-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autoscaler-role
  namespace: inference-system
rules:
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: autoscaler-rolebinding
  namespace: inference-system
subjects:
  - kind: ServiceAccount
    name: autoscaler-sa
    namespace: inference-system
roleRef:
  kind: Role
  name: autoscaler-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-autoscaler
  namespace: inference-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-autoscaler
  template:
    metadata:
      labels:
        app: custom-autoscaler
    spec:
      serviceAccountName: autoscaler-sa
      containers:
        - name: autoscaler
          image: autoscaler:latest
          imagePullPolicy: IfNotPresent
          # Real scaling is the default. To run the autoscaler in observe-only
          # mode (compute decisions without patching replicas), override with:
          #   args: ["--dry-run"]
          args: []
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus:9090
            - name: DEPLOYMENT_NAME
              value: inference
            - name: DEPLOYMENT_NAMESPACE
              value: inference-system
            - name: INTERVAL_SEC
              value: "15"
            - name: REPLICA_MIN
              value: "1"
            - name: REPLICA_MAX
              value: "10"
            - name: MAX_DELTA_PER_CYCLE
              value: "1"
            - name: SERVICE_TIME_SECONDS
              value: "0.2"

