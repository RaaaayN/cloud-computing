apiVersion: v1
kind: ServiceAccount
metadata:
  name: autoscaler-sa
  namespace: inference-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autoscaler-role
  namespace: inference-system
rules:
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: autoscaler-rolebinding
  namespace: inference-system
subjects:
  - kind: ServiceAccount
    name: autoscaler-sa
    namespace: inference-system
roleRef:
  kind: Role
  name: autoscaler-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-autoscaler
  namespace: inference-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-autoscaler
  template:
    metadata:
      labels:
        app: custom-autoscaler
    spec:
      serviceAccountName: autoscaler-sa
      containers:
        - name: autoscaler
          image: autoscaler:latest
          imagePullPolicy: IfNotPresent
          # Real scaling is the default. To run the autoscaler in observe-only
          # mode (compute decisions without patching replicas), override with:
          #   args: ["--dry-run"]
          args: []
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus:9090
            - name: DEPLOYMENT_NAME
              value: inference
            - name: DEPLOYMENT_NAMESPACE
              value: inference-system
            - name: INTERVAL_SEC
              value: "15"
            - name: REPLICA_MIN
              value: "1"            # match HPA's floor at baseline -> tie on cores
                                    # when load is low (1 replica serves ~7 rps fine)
            - name: REPLICA_MAX
              value: "3"            # headless dispatch drives one request per ready pod,
                                    # so concurrency == replica count. On this node ~4-5
                                    # concurrent ResNet18 inferences contend (memory
                                    # bandwidth) and p99 climbs; cap at 3 to stay in the
                                    # low-contention regime while still serving more than
                                    # HPA (which stalls at 1-3 on the saturated CPU signal).
            - name: HEADROOM
              value: "1.3"          # light over-provision; with service_time below this
                                    # keeps baseline at 1 replica (no core loss vs HPA)
            - name: MAX_DELTA_PER_CYCLE
              value: "5"            # reach the cap in one cycle on a burst -> beat HPA's
                                    # slow ramp on the rising edge (win latency at onset)
            - name: S_WARN
              value: "0.40"         # react before the 0.5s SLO is breached
            - name: SERVICE_TIME_SECONDS
              value: "0.1"          # uncontended inference is ~0.08s; this keeps the
                                    # baseline estimate at 1 replica yet still scales on
                                    # the burst via arrival rate + the fast-scale path
            - name: COOLDOWN_CYCLES
              value: "6"            # ~90s before scaling down: still far faster than
                                    # HPA's default 5-min stabilization (win cores on the
                                    # falling edge) but no longer thrashes (5 cycles let a
                                    # brief lull scale down then immediately scale back up)
            - name: PROM_QUERY_ARRIVAL_RATE
              value: "rate(dispatcher_requests_total[30s])"   # leading demand signal

