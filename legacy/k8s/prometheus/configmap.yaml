apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: inference-system
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      # Per-pod discovery so every inference replica is scraped individually
      # (Service DNS would only hit one pod -> cannot count replicas or sum CPU).
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [inference-system]
        relabel_configs:
          # keep only pods annotated prometheus.io/scrape: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # metrics path from prometheus.io/path
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # scrape on prometheus.io/port
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # job = app label (inference / dispatcher / loadtester)
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: job
          # keep the pod name as a label
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
