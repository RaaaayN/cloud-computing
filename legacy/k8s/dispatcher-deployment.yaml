apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher
  namespace: inference-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcher
  template:
    metadata:
      labels:
        app: dispatcher
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8002"
    spec:
      containers:
        - name: dispatcher
          image: dispatcher:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          env:
            # Worker pool >= maxReplicas so all replicas can be driven (4 capped
            # throughput at ~2 cores and saturated the queue at 100 -> p99 ~10s).
            - name: DISPATCHER_WORKER_COUNT
              value: "20"
            - name: INFERENCE_HEADLESS
              value: "inference-headless.inference-system.svc.cluster.local"
            # Short queue: bound the served-query wait, load-shed the rest (503),
            # so server-side p99 stays under the 0.5s SLO.
            - name: DISPATCHER_QUEUE_MAX_SIZE
              value: "3"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dispatcher
  namespace: inference-system
spec:
  selector:
    app: dispatcher
  ports:
    - name: http
      port: 8002
      targetPort: 8002
  type: ClusterIP

