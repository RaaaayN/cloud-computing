apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-project
  labels:
    app: resnet-infer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resnet-infer
  template:
    metadata:
      labels:
        app: resnet-infer
    spec:
      containers:
        - name: resnet-infer
          image: inference-model  # Replace with your Docker Hub image if not using Minikube
          imagePullPolicy: Never
          ports:
            - containerPort: 6001  # Flask API
            - containerPort: 8001  # Prometheus metrics
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
