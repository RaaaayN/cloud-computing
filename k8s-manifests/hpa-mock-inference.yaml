# CPU HPA for mock-inference (needs metrics-server)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-70
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mock-inference
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
