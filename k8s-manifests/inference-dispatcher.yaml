# mock-inference + inference-svc (cluster) + dispatcher + dispatcher NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-inference
  labels:
    app: mock-inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mock-inference
  template:
    metadata:
      labels:
        app: mock-inference
    spec:
      containers:
        - name: mock-inference
          image: mock-inference:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "1" # HPA denominator; keep == limit for this lab
            limits:
              cpu: "1" # project cap: 1 core
---
apiVersion: v1
kind: Service
metadata:
  name: inference-service
  labels:
    app: mock-inference
spec:
  type: ClusterIP
  selector:
    app: mock-inference
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher
  labels:
    app: dispatcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcher
  template:
    metadata:
      labels:
        app: dispatcher
    spec:
      containers:
        - name: dispatcher
          image: dispatcher:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "1"
            requests:
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: dispatcher-service
  labels:
    app: dispatcher
spec:
  type: NodePort
  selector:
    app: dispatcher
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30080
