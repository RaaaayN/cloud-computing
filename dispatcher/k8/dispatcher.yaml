apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcher
  template:
    metadata:
      labels:
        app: dispatcher
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: dispatcher
          image: dispatcher:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
            - containerPort: 8000
          env:
            - name: INFERENCE_URL
              value: "http://tu-cloud-project/"
            - name: DISPATCHER_WORKER_COUNT
              value: "8"
            - name: DISPATCHER_QUEUE_MAX
              value: "3"
---
apiVersion: v1
kind: Service
metadata:
  name: dispatcher
spec:
  selector:
    app: dispatcher
  ports:
    - name: http
      port: 5001
      targetPort: 5001
    - name: metrics
      port: 8000
      targetPort: 8000
