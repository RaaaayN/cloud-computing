apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: "dispatcher"
        static_configs:
          - targets: ["dispatcher-service:8000"]
      - job_name: "inference_service"
        static_configs:
          - targets: ["tu-cloud-project:8001"]